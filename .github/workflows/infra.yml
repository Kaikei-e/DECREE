name: Infra CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/infra.yml"
      - "db/**"
      - "docker-compose.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/infra.yml"
      - "db/**"
      - "docker-compose.yml"

jobs:
  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
