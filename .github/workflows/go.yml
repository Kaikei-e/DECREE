name: Go CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/go.yml"
      - "services/oracle/**"
      - "services/gateway/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/go.yml"
      - "services/oracle/**"
      - "services/gateway/**"

jobs:
  oracle:
    name: Oracle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/oracle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
      - run: gofmt -l . | (! grep .)
      - run: go vet ./...
      - run: go test ./...

  gateway:
    name: Gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
      - run: gofmt -l . | (! grep .)
      - run: go vet ./...
      - run: go test ./...
