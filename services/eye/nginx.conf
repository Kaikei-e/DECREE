server {
    listen 3400;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /healthz {
        access_log off;
        return 200 '{"status":"ok","service":"decree-eye"}';
        add_header Content-Type application/json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
